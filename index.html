<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房产成交对比查询系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif; }
  .delta-up { color: #dc2626; }
  .delta-down { color: #16a34a; }
  .delta-flat { color: #6b7280; }
  .stat-card { transition: transform 0.15s; }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
  .chip { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 9999px; font-size: 12px; border: 1px solid #e5e7eb; cursor: pointer; user-select: none; transition: all 0.15s; }
  .chip:hover { background-color: #f3f4f6; }
  .chip.active { background-color: #2563eb; color: white; border-color: #2563eb; }
  .radio-pill { padding: 6px 14px; border-radius: 9999px; border: 1px solid #d1d5db; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .radio-pill.active { background-color: #1f2937; color: white; border-color: #1f2937; }
  .metric-row { display: grid; grid-template-columns: 80px 1fr; gap: 8px; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed #f3f4f6; }
  .metric-row:last-child { border-bottom: none; }
  .metric-label { font-size: 12px; color: #6b7280; }
  .metric-value { font-size: 18px; font-weight: 600; color: #111827; }
  .metric-deltas { display: flex; gap: 8px; font-size: 11px; margin-top: 2px; }
  details > summary { cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .arrow { display: inline-block; transition: transform 0.2s; }
  details[open] .arrow { transform: rotate(90deg); }
</style>
</head>
<body class="bg-slate-50 min-h-screen">
<div class="max-w-7xl mx-auto px-4 py-6">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">房产成交对比查询系统</h1>
    <p class="text-sm text-slate-500 mt-1">基于 245 条成交记录 · 数据范围 2018-2026</p>
  </div>

  <!-- Filter Panel -->
  <div class="bg-white rounded-lg shadow-sm border border-slate-200 mb-6">
    <details open>
      <summary class="px-5 py-4 font-medium text-slate-700 flex items-center gap-2 hover:bg-slate-50 rounded-t-lg">
        <span class="arrow">▶</span> 查询条件
      </summary>
      <div class="px-5 pb-5 space-y-4 border-t border-slate-100 pt-4">

        <!-- 时间粒度 -->
        <div>
          <label class="text-sm text-slate-600 block mb-2">时间粒度</label>
          <div class="flex gap-2" id="granularity-group">
            <span class="radio-pill active" data-value="year">按年</span>
            <span class="radio-pill" data-value="half">按半年</span>
            <span class="radio-pill" data-value="quarter">按季度</span>
          </div>
        </div>

        <!-- 时间周期 -->
        <div>
          <label class="text-sm text-slate-600 block mb-2">查询周期</label>
          <select id="period-select" class="border border-slate-300 rounded-md px-3 py-1.5 text-sm bg-white"></select>
        </div>

        <!-- 户型 -->
        <div>
          <label class="text-sm text-slate-600 block mb-2">户型 <span class="text-xs text-slate-400">(不选=全部)</span></label>
          <div class="flex flex-wrap gap-2" id="huxing-group"></div>
        </div>

        <!-- 建筑面积 -->
        <div>
          <label class="text-sm text-slate-600 block mb-2">建筑面积 (平米)</label>
          <div class="flex items-center gap-2">
            <input id="area-min" type="number" step="0.1" class="w-24 border border-slate-300 rounded-md px-2 py-1 text-sm" />
            <span class="text-slate-400">至</span>
            <input id="area-max" type="number" step="0.1" class="w-24 border border-slate-300 rounded-md px-2 py-1 text-sm" />
            <span class="text-xs text-slate-400 ml-2" id="area-range-hint"></span>
          </div>
        </div>

        <!-- 楼层 -->
        <div>
          <label class="text-sm text-slate-600 block mb-2">楼层 <span class="text-xs text-slate-400">(不选=全部)</span></label>
          <div class="flex flex-wrap gap-2" id="floor-group"></div>
        </div>

        <!-- 朝向 -->
        <div>
          <label class="text-sm text-slate-600 block mb-2">朝向 <span class="text-xs text-slate-400">(包含任一即可,不选=全部)</span></label>
          <div class="flex flex-wrap gap-2" id="orient-group"></div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 pt-2">
          <button id="query-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium shadow-sm">查询对比</button>
          <button id="reset-btn" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-5 py-2 rounded-md text-sm font-medium">重置</button>
        </div>
      </div>
    </details>
  </div>

  <!-- Period Info Banner -->
  <div id="period-info" class="bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 mb-4 text-sm text-blue-900"></div>

  <!-- Results -->
  <div id="results-container"></div>

  <!-- Empty State -->
  <div id="empty-state" class="hidden bg-white rounded-lg border border-slate-200 p-12 text-center">
    <div class="text-slate-400 text-lg mb-2">📭</div>
    <div class="text-slate-600">所选条件下无成交数据</div>
    <div class="text-slate-400 text-sm mt-1">请尝试放宽筛选条件</div>
  </div>

</div>

  huxings: new Set(),
  floors: new Set(),
  orients: new Set(),
  areaMin: AREA_MIN,
  areaMax: AREA_MAX
};

// ===== Period builders =====
function buildPeriodOptions(gran) {
  const opts = [];
  if (gran === "year") {
    YEARS.forEach(y => opts.push({ value: `${y}`, label: `${y}年`, year: y, type: "year" }));
  } else if (gran === "half") {
    YEARS.forEach(y => {
      opts.push({ value: `${y}-H1`, label: `${y}年上半年`, year: y, half: "上半年", type: "half" });
      opts.push({ value: `${y}-H2`, label: `${y}年下半年`, year: y, half: "下半年", type: "half" });
    });
  } else if (gran === "quarter") {
    YEARS.forEach(y => {
      for (let q = 1; q <= 4; q++) {
        opts.push({ value: `${y}-Q${q}`, label: `${y}年Q${q}`, year: y, quarter: `Q${q}`, type: "quarter" });
      }
    });
  }
  return opts;
}

function parsePeriod(value) {
  return buildPeriodOptions(state.granularity).find(o => o.value === value);
}

function parsePeriodOpt(opt) {
  return opt;
}

function prevYoYPeriod(period) {
  // 同比: same period in previous year
  if (period.type === "year") return { ...period, year: period.year - 1, value: `${period.year - 1}` };
  if (period.type === "half") return { ...period, year: period.year - 1, value: `${period.year - 1}-${period.half === "上半年" ? "H1" : "H2"}` };
  if (period.type === "quarter") return { ...period, year: period.year - 1, value: `${period.year - 1}-${period.quarter}` };
}

function prevQoQPeriod(period) {
  // 环比: previous adjacent period
  if (period.type === "year") return { ...period, year: period.year - 1, value: `${period.year - 1}` };
  if (period.type === "half") {
    if (period.half === "下半年") return { type: "half", year: period.year, half: "上半年", value: `${period.year}-H1` };
    return { type: "half", year: period.year - 1, half: "下半年", value: `${period.year - 1}-H2` };
  }
  if (period.type === "quarter") {
    const qn = parseInt(period.quarter.slice(1));
    if (qn > 1) return { type: "quarter", year: period.year, quarter: `Q${qn-1}`, value: `${period.year}-Q${qn-1}` };
    return { type: "quarter", year: period.year - 1, quarter: "Q4", value: `${period.year - 1}-Q4` };
  }
}

// ===== Filtering =====
function matchPeriod(record, period) {
  if (record["年份"] !== period.year) return false;
  if (period.type === "year") return true;
  if (period.type === "half") return record["半年"] === period.half;
  if (period.type === "quarter") return record["季度"] === period.quarter;
  return false;
}

function filterRecords(period) {
  return RAW_DATA.filter(r => {
    if (!matchPeriod(r, period)) return false;
    if (state.huxings.size > 0 && !state.huxings.has(r["户型"])) return false;
    if (state.floors.size > 0 && !state.floors.has(r["楼层级别"])) return false;
    if (state.orients.size > 0) {
      const hasAny = r["朝向列表"].some(d => state.orients.has(d));
      if (!hasAny) return false;
    }
    if (r["建筑面积"] < state.areaMin || r["建筑面积"] > state.areaMax) return false;
    return true;
  });
}

// ===== Statistics =====
function stats(values) {
  if (values.length === 0) return null;
  const sorted = [...values].sort((a, b) => a - b);
  const sum = sorted.reduce((s, v) => s + v, 0);
  const mid = sorted.length / 2;
  const median = sorted.length % 2 === 0 ? (sorted[mid - 1] + sorted[mid]) / 2 : sorted[Math.floor(mid)];
  return {
    count: sorted.length,
    mean: sum / sorted.length,
    min: sorted[0],
    max: sorted[sorted.length - 1],
    median: median
  };
}

function computeForCommunity(recs) {
  if (recs.length === 0) return null;
  const prices = recs.map(r => r["成交总价"]);
  const days = recs.map(r => r["成交周期"]);
  return {
    count: recs.length,
    price: stats(prices),
    days: stats(days)
  };
}

// ===== Formatting =====
function fmtNum(v, digits = 1) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return v.toFixed(digits);
}
function fmtInt(v) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return Math.round(v).toString();
}

function deltaPct(curr, prev) {
  if (prev === null || prev === undefined || prev === 0 || curr === null || curr === undefined) return null;
  return (curr - prev) / prev * 100;
}

function deltaAbs(curr, prev) {
  if (prev === null || prev === undefined || curr === null || curr === undefined) return null;
  return curr - prev;
}

function renderDelta(label, pct, abs, unit) {
  if (pct === null) return `<span class="delta-flat">${label}: —</span>`;
  const sign = pct > 0 ? "↑" : (pct < 0 ? "↓" : "—");
  const cls = pct > 0 ? "delta-up" : (pct < 0 ? "delta-down" : "delta-flat");
  const absStr = abs !== null ? ` (${abs >= 0 ? "+" : ""}${fmtNum(abs, unit === "天" ? 0 : 1)}${unit})` : "";
  return `<span class="${cls}">${label} ${sign}${Math.abs(pct).toFixed(1)}%${absStr}</span>`;
}

// ===== Render =====
function renderMetricRow(label, currVal, yoyVal, qoqVal, unit, isInt = false) {
  const fmt = isInt ? fmtInt : (v) => fmtNum(v, 1);
  const yoyPct = deltaPct(currVal, yoyVal);
  const yoyAbs = deltaAbs(currVal, yoyVal);
  const qoqPct = deltaPct(currVal, qoqVal);
  const qoqAbs = deltaAbs(currVal, qoqVal);
  return `
    <div class="metric-row">
      <div class="metric-label">${label}</div>
      <div>
        <div class="metric-value">${fmt(currVal)}<span class="text-xs text-slate-400 font-normal ml-1">${unit}</span></div>
        <div class="metric-deltas">
          ${renderDelta("同比", yoyPct, yoyAbs, unit)}
          ${renderDelta("环比", qoqPct, qoqAbs, unit)}
        </div>
      </div>
    </div>
  `;
}

function getMetric(s, name) {
  if (!s) return null;
  return s[name];
}

function renderCommunityCard(community, curr, yoy, qoq) {
  if (!curr) {
    return `
      <div class="stat-card bg-white rounded-lg border border-slate-200 p-5">
        <div class="font-semibold text-slate-800 text-lg">${community}</div>
        <div class="text-slate-400 text-sm mt-1">本期 0 套成交</div>
        <div class="mt-4 text-slate-400 text-sm py-8 text-center border-t border-slate-100">无数据</div>
      </div>
    `;
  }

  const pYoY = getMetric(yoy, "price");
  const dYoY = getMetric(yoy, "days");
  const pQoQ = getMetric(qoq, "price");
  const dQoQ = getMetric(qoq, "days");

  return `
    <div class="stat-card bg-white rounded-lg border border-slate-200 p-5">
      <div class="flex items-baseline justify-between mb-3">
        <div class="font-semibold text-slate-800 text-lg">${community}</div>
        <div class="text-sm">
          <span class="text-slate-500">本期</span>
          <span class="font-semibold text-blue-600 ml-1">${curr.count}</span>
          <span class="text-slate-500"> 套</span>
          ${yoy ? `<span class="text-slate-400 mx-1">·</span><span class="text-xs text-slate-400">同比 ${yoy.count}</span>` : ""}
          ${qoq ? `<span class="text-slate-400 mx-1">·</span><span class="text-xs text-slate-400">环比 ${qoq.count}</span>` : ""}
        </div>
      </div>

      <div class="mb-4">
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1 bg-slate-50 px-2 py-1 rounded">成交总价 (万)</div>
        ${renderMetricRow("均价", curr.price.mean, pYoY?.mean, pQoQ?.mean, "万")}
        ${renderMetricRow("最低价", curr.price.min, pYoY?.min, pQoQ?.min, "万")}
        ${renderMetricRow("最高价", curr.price.max, pYoY?.max, pQoQ?.max, "万")}
        ${renderMetricRow("中位价", curr.price.median, pYoY?.median, pQoQ?.median, "万")}
      </div>

      <div>
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1 bg-slate-50 px-2 py-1 rounded">成交周期 (天)</div>
        ${renderMetricRow("平均", curr.days.mean, dYoY?.mean, dQoQ?.mean, "天", true)}
        ${renderMetricRow("最短", curr.days.min, dYoY?.min, dQoQ?.min, "天", true)}
        ${renderMetricRow("最长", curr.days.max, dYoY?.max, dQoQ?.max, "天", true)}
        ${renderMetricRow("中位", curr.days.median, dYoY?.median, dQoQ?.median, "天", true)}
      </div>
    </div>
  `;
}

function renderResults() {
  const period = parsePeriod(state.period);
  if (!period) return;
  const yoyP = prevYoYPeriod(period);
  const qoqP = prevQoQPeriod(period);

  const info = document.getElementById("period-info");
  let infoText = `当前周期: <strong>${period.label}</strong>`;
  const yoyOpt = buildPeriodOptions(state.granularity).find(o => o.value === yoyP.value);
  const qoqOpt = buildPeriodOptions(state.granularity).find(o => o.value === qoqP.value);
  if (yoyOpt) infoText += ` · 同比: ${yoyOpt.label}`;
  if (qoqOpt && qoqOpt.value !== yoyOpt?.value) infoText += ` · 环比: ${qoqOpt.label}`;
  else if (qoqOpt && qoqOpt.value === yoyOpt?.value) infoText += ` <span class="text-xs">(年度粒度下同比=环比)</span>`;
  info.innerHTML = infoText;

  const currRecs = filterRecords(period);
  const yoyRecs = filterRecords(yoyP);
  const qoqRecs = filterRecords(qoqP);

  const container = document.getElementById("results-container");
  const empty = document.getElementById("empty-state");

  if (currRecs.length === 0) {
    container.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  const cards = COMMUNITIES.map(c => {
    const curr = computeForCommunity(currRecs.filter(r => r["小区"] === c));
    const yoy = computeForCommunity(yoyRecs.filter(r => r["小区"] === c));
    const qoq = computeForCommunity(qoqRecs.filter(r => r["小区"] === c));
    return renderCommunityCard(c, curr, yoy, qoq);
  }).join("");

  container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${cards}</div>`;
}

// ===== UI Build =====
function buildChipGroup(containerId, items, stateSet) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(item => `<span class="chip" data-value="${item}">${item}</span>`).join("");
  el.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const v = chip.dataset.value;
      if (stateSet.has(v)) { stateSet.delete(v); chip.classList.remove("active"); }
      else { stateSet.add(v); chip.classList.add("active"); }
    });
  });
}

function rebuildPeriodSelect() {
  const sel = document.getElementById("period-select");
  const opts = buildPeriodOptions(state.granularity);
  sel.innerHTML = opts.map(o => `<option value="${o.value}">${o.label}</option>`).join("");
  // default to latest
  // Default to the latest period with the most data (skip empty periods near "now")
  let defaultIdx = opts.length - 1;
  for (let i = opts.length - 1; i >= 0; i--) {
    const o = opts[i];
    const tmpPeriod = parsePeriodOpt(o);
    const count = RAW_DATA.filter(r => matchPeriod(r, tmpPeriod)).length;
    if (count >= 5) { defaultIdx = i; break; }
  }
  state.period = opts[defaultIdx].value;
  sel.value = state.period;
}

function init() {
  buildChipGroup("huxing-group", HUXINGS, state.huxings);
  buildChipGroup("floor-group", FLOOR_LEVELS, state.floors);
  buildChipGroup("orient-group", ORIENTATIONS, state.orients);

  document.getElementById("area-min").value = AREA_MIN;
  document.getElementById("area-max").value = AREA_MAX;
  document.getElementById("area-range-hint").textContent = `(实际范围 ${AREA_MIN.toFixed(0)} - ${AREA_MAX.toFixed(0)})`;

  document.querySelectorAll("#granularity-group .radio-pill").forEach(pill => {
    pill.addEventListener("click", () => {
      document.querySelectorAll("#granularity-group .radio-pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      state.granularity = pill.dataset.value;
      rebuildPeriodSelect();
    });
  });

  rebuildPeriodSelect();

  document.getElementById("period-select").addEventListener("change", e => {
    state.period = e.target.value;
  });

  document.getElementById("query-btn").addEventListener("click", () => {
    state.areaMin = parseFloat(document.getElementById("area-min").value) || AREA_MIN;
    state.areaMax = parseFloat(document.getElementById("area-max").value) || AREA_MAX;
    renderResults();
  });

  document.getElementById("reset-btn").addEventListener("click", () => {
    state.huxings.clear(); state.floors.clear(); state.orients.clear();
    document.querySelectorAll(".chip.active").forEach(c => c.classList.remove("active"));
    document.getElementById("area-min").value = AREA_MIN;
    document.getElementById("area-max").value = AREA_MAX;
    state.areaMin = AREA_MIN; state.areaMax = AREA_MAX;
    state.granularity = "year";
    document.querySelectorAll("#granularity-group .radio-pill").forEach(p => {
      p.classList.toggle("active", p.dataset.value === "year");
    });
    rebuildPeriodSelect();
    renderResults();
  });

  // initial render
  renderResults();
}

init();
</script>
</body>
