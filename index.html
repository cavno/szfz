<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房产成交对比查询系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif; }
  .delta-up { color: #dc2626; }
  .delta-down { color: #16a34a; }
  .delta-flat { color: #6b7280; }
  .stat-card { transition: transform 0.15s; }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
  .chip { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 9999px; font-size: 12px; border: 1px solid #e5e7eb; cursor: pointer; user-select: none; transition: all 0.15s; background: white; }
  .chip:hover { background-color: #f3f4f6; }
  .chip.active { background-color: #2563eb; color: white; border-color: #2563eb; }
  .chip-period { font-size: 12px; padding: 4px 10px; }
  .chip-period.active { background-color: #0ea5e9; border-color: #0ea5e9; }
  .radio-pill { padding: 6px 14px; border-radius: 9999px; border: 1px solid #d1d5db; cursor: pointer; font-size: 13px; transition: all 0.15s; background: white; }
  .radio-pill.active { background-color: #1f2937; color: white; border-color: #1f2937; }
  .metric-row { display: grid; grid-template-columns: 80px 1fr; gap: 8px; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed #f3f4f6; }
  .metric-row:last-child { border-bottom: none; }
  .metric-label { font-size: 12px; color: #6b7280; }
  .metric-value { font-size: 18px; font-weight: 600; color: #111827; }
  .metric-deltas { display: flex; gap: 8px; font-size: 11px; margin-top: 2px; flex-wrap: wrap; }
  details > summary { cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .arrow { display: inline-block; transition: transform 0.2s; }
  details[open] .arrow { transform: rotate(90deg); }
  .mini-btn { padding: 2px 10px; border-radius: 9999px; font-size: 11px; border: 1px solid #d1d5db; background: white; cursor: pointer; color: #475569; }
  .mini-btn:hover { background-color: #f8fafc; }
  .data-table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .data-table th, .data-table td { padding: 8px 10px; border-bottom: 1px solid #e5e7eb; text-align: right; }
  .data-table th:first-child, .data-table td:first-child { text-align: left; }
  .data-table thead th { background: #f8fafc; color: #475569; font-weight: 600; }
  .data-table tbody tr:hover { background: #f8fafc; }
</style>
</head>
<body class="bg-slate-50 min-h-screen">
<div class="max-w-7xl mx-auto px-4 py-6">

  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">房产成交对比查询系统</h1>
    <p class="text-sm text-slate-500 mt-1">基于 341 条成交记录 · 数据范围 2018-2026 · 11 个小区</p>
  </div>

  <div class="bg-white rounded-lg shadow-sm border border-slate-200 mb-6">
    <details open>
      <summary class="px-5 py-4 font-medium text-slate-700 flex items-center gap-2 hover:bg-slate-50 rounded-t-lg">
        <span class="arrow">▶</span> 查询条件
      </summary>
      <div class="px-5 pb-5 space-y-4 border-t border-slate-100 pt-4">

        <div>
          <label class="text-sm text-slate-600 block mb-2">时间粒度</label>
          <div class="flex gap-2" id="granularity-group">
            <span class="radio-pill active" data-value="year">按年</span>
            <span class="radio-pill" data-value="half">按半年</span>
            <span class="radio-pill" data-value="quarter">按季度</span>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm text-slate-600">查询周期 <span class="text-xs text-slate-400">(可多选;选 2 个及以上将显示柱状+变动率双轴对比图)</span></label>
            <div class="flex gap-2">
              <button class="mini-btn" id="period-all-btn">全选</button>
              <button class="mini-btn" id="period-recent-btn">近 3 期</button>
              <button class="mini-btn" id="period-clear-btn">清空</button>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-1" id="period-group"></div>
        </div>

        <div>
          <label class="text-sm text-slate-600 block mb-2">小区 <span class="text-xs text-slate-400">(不选=全部)</span></label>
          <div class="flex flex-wrap gap-2" id="community-group"></div>
        </div>

        <div>
          <label class="text-sm text-slate-600 block mb-2">户型 <span class="text-xs text-slate-400">(不选=全部)</span></label>
          <div class="flex flex-wrap gap-2" id="huxing-group"></div>
        </div>

        <div>
          <label class="text-sm text-slate-600 block mb-2">建筑面积 (平米)</label>
          <div class="flex items-center gap-2">
            <input id="area-min" type="number" step="0.1" class="w-24 border border-slate-300 rounded-md px-2 py-1 text-sm" />
            <span class="text-slate-400">至</span>
            <input id="area-max" type="number" step="0.1" class="w-24 border border-slate-300 rounded-md px-2 py-1 text-sm" />
            <span class="text-xs text-slate-400 ml-2" id="area-range-hint"></span>
          </div>
        </div>

        <div>
          <label class="text-sm text-slate-600 block mb-2">楼层 <span class="text-xs text-slate-400">(不选=全部)</span></label>
          <div class="flex flex-wrap gap-2" id="floor-group"></div>
        </div>

        <div>
          <label class="text-sm text-slate-600 block mb-2">朝向 <span class="text-xs text-slate-400">(包含任一即可,不选=全部)</span></label>
          <div class="flex flex-wrap gap-2" id="orient-group"></div>
        </div>

        <div class="flex gap-3 pt-2">
          <button id="query-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium shadow-sm">查询对比</button>
          <button id="reset-btn" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 px-5 py-2 rounded-md text-sm font-medium">重置</button>
        </div>
      </div>
    </details>
  </div>

  <div id="period-info" class="bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 mb-4 text-sm text-blue-900"></div>

  <div id="results-container"></div>

  <div id="empty-state" class="hidden bg-white rounded-lg border border-slate-200 p-12 text-center">
    <div class="text-slate-400 text-lg mb-2">📭</div>
    <div class="text-slate-600">所选条件下无成交数据</div>
    <div class="text-slate-400 text-sm mt-1">请尝试放宽筛选条件或选择其他周期</div>
  </div>

</div>

// ===== Distinct values =====
const COMMUNITIES = [...new Set(RAW_DATA.map(r => r["小区"]))].sort();
const HUXINGS = [...new Set(RAW_DATA.map(r => r["户型"]))].sort();
const FLOOR_LEVELS = ["高楼层","中楼层","低楼层"];
const ORIENTATIONS = ["南","北","东","西","东南","东北","西南","西北"];
const YEARS = [...new Set(RAW_DATA.map(r => r["年份"]))].sort();
const AREA_MIN = Math.floor(Math.min(...RAW_DATA.map(r => r["建筑面积"])));
const AREA_MAX = Math.ceil(Math.max(...RAW_DATA.map(r => r["建筑面积"])));
const COMMUNITY_COLORS = ["#2563eb", "#dc2626", "#16a34a", "#a855f7", "#ea580c", "#0891b2", "#ca8a04", "#db2777", "#65a30d", "#475569", "#7c3aed"];

// ===== State =====
const state = {
  granularity: "year",
  periods: new Set(),
  communities: new Set(),
  huxings: new Set(),
  floors: new Set(),
  orients: new Set(),
  areaMin: AREA_MIN,
  areaMax: AREA_MAX
};

// ===== Period builders =====
function buildPeriodOptions(gran) {
  const opts = [];
  if (gran === "year") {
    YEARS.forEach(y => opts.push({ value: `${y}`, label: `${y}`, shortLabel: `${y}`, year: y, type: "year" }));
  } else if (gran === "half") {
    YEARS.forEach(y => {
      opts.push({ value: `${y}-H1`, label: `${y}年上半年`, shortLabel: `${y}H1`, year: y, half: "上半年", type: "half" });
      opts.push({ value: `${y}-H2`, label: `${y}年下半年`, shortLabel: `${y}H2`, year: y, half: "下半年", type: "half" });
    });
  } else if (gran === "quarter") {
    YEARS.forEach(y => {
      for (let q = 1; q <= 4; q++) {
        opts.push({ value: `${y}-Q${q}`, label: `${y}年Q${q}`, shortLabel: `${y}Q${q}`, year: y, quarter: `Q${q}`, type: "quarter" });
      }
    });
  }
  return opts;
}

function getSortedSelectedPeriods() {
  return buildPeriodOptions(state.granularity).filter(o => state.periods.has(o.value));
}

function getSelectedCommunities() {
  return state.communities.size === 0 ? COMMUNITIES : COMMUNITIES.filter(c => state.communities.has(c));
}

function prevYoYPeriod(period) {
  if (period.type === "year") return { ...period, year: period.year - 1, value: `${period.year - 1}`, label: `${period.year - 1}` };
  if (period.type === "half") return { ...period, year: period.year - 1, value: `${period.year - 1}-${period.half === "上半年" ? "H1" : "H2"}`, label: `${period.year - 1}年${period.half}` };
  if (period.type === "quarter") return { ...period, year: period.year - 1, value: `${period.year - 1}-${period.quarter}`, label: `${period.year - 1}年${period.quarter}` };
}

function prevQoQPeriod(period) {
  if (period.type === "year") return { ...period, year: period.year - 1, value: `${period.year - 1}`, label: `${period.year - 1}` };
  if (period.type === "half") {
    if (period.half === "下半年") return { type: "half", year: period.year, half: "上半年", value: `${period.year}-H1`, label: `${period.year}年上半年` };
    return { type: "half", year: period.year - 1, half: "下半年", value: `${period.year - 1}-H2`, label: `${period.year - 1}年下半年` };
  }
  if (period.type === "quarter") {
    const qn = parseInt(period.quarter.slice(1));
    if (qn > 1) return { type: "quarter", year: period.year, quarter: `Q${qn-1}`, value: `${period.year}-Q${qn-1}`, label: `${period.year}年Q${qn-1}` };
    return { type: "quarter", year: period.year - 1, quarter: "Q4", value: `${period.year - 1}-Q4`, label: `${period.year - 1}年Q4` };
  }
}

// ===== Filtering =====
function matchPeriod(record, period) {
  if (record["年份"] !== period.year) return false;
  if (period.type === "year") return true;
  if (period.type === "half") return record["半年"] === period.half;
  if (period.type === "quarter") return record["季度"] === period.quarter;
  return false;
}

function filterRecords(period) {
  return RAW_DATA.filter(r => {
    if (!matchPeriod(r, period)) return false;
    if (state.huxings.size > 0 && !state.huxings.has(r["户型"])) return false;
    if (state.floors.size > 0 && !state.floors.has(r["楼层级别"])) return false;
    if (state.orients.size > 0) {
      const hasAny = r["朝向列表"].some(d => state.orients.has(d));
      if (!hasAny) return false;
    }
    if (r["建筑面积"] < state.areaMin || r["建筑面积"] > state.areaMax) return false;
    return true;
  });
}

// ===== Statistics =====
function stats(values) {
  if (values.length === 0) return null;
  const sorted = [...values].sort((a, b) => a - b);
  const sum = sorted.reduce((s, v) => s + v, 0);
  const mid = sorted.length / 2;
  const median = sorted.length % 2 === 0 ? (sorted[mid - 1] + sorted[mid]) / 2 : sorted[Math.floor(mid)];
  return {
    count: sorted.length,
    mean: sum / sorted.length,
    min: sorted[0],
    max: sorted[sorted.length - 1],
    median: median
  };
}

function computeForCommunity(recs) {
  if (recs.length === 0) return null;
  const prices = recs.map(r => r["成交总价"]);
  const days = recs.map(r => r["成交周期"]);
  return {
    count: recs.length,
    price: stats(prices),
    days: stats(days)
  };
}

// ===== Formatting =====
function fmtNum(v, digits = 1) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return v.toFixed(digits);
}
function fmtInt(v) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return Math.round(v).toString();
}
function deltaPct(curr, prev) {
  if (prev === null || prev === undefined || prev === 0 || curr === null || curr === undefined) return null;
  return (curr - prev) / prev * 100;
}
function deltaAbs(curr, prev) {
  if (prev === null || prev === undefined || curr === null || curr === undefined) return null;
  return curr - prev;
}
function renderDelta(label, pct, abs, unit) {
  if (pct === null) return `<span class="delta-flat">${label}: —</span>`;
  const sign = pct > 0 ? "↑" : (pct < 0 ? "↓" : "—");
  const cls = pct > 0 ? "delta-up" : (pct < 0 ? "delta-down" : "delta-flat");
  const absStr = abs !== null ? ` (${abs >= 0 ? "+" : ""}${fmtNum(abs, unit === "天" ? 0 : 1)}${unit})` : "";
  return `<span class="${cls}">${label} ${sign}${Math.abs(pct).toFixed(1)}%${absStr}</span>`;
}

// ===== Single-period card view =====
function renderMetricRow(label, currVal, yoyVal, qoqVal, unit, isInt = false) {
  const fmt = isInt ? fmtInt : (v) => fmtNum(v, 1);
  const yoyPct = deltaPct(currVal, yoyVal);
  const yoyAbs = deltaAbs(currVal, yoyVal);
  const qoqPct = deltaPct(currVal, qoqVal);
  const qoqAbs = deltaAbs(currVal, qoqVal);
  return `
    <div class="metric-row">
      <div class="metric-label">${label}</div>
      <div>
        <div class="metric-value">${fmt(currVal)}<span class="text-xs text-slate-400 font-normal ml-1">${unit}</span></div>
        <div class="metric-deltas">
          ${renderDelta("同比", yoyPct, yoyAbs, unit)}
          ${renderDelta("环比", qoqPct, qoqAbs, unit)}
        </div>
      </div>
    </div>
  `;
}

function getMetric(s, name) { if (!s) return null; return s[name]; }

        ${renderMetricRow("最长", curr.days.max, dYoY?.max, dQoQ?.max, "天", true)}

function renderSinglePeriodView(period) {
  const yoyP = prevYoYPeriod(period);

  else if (qoqP && yoyP && qoqP.value === yoyP.value) infoText += ` <span class="text-xs">(年度粒度下同比=环比)</span>`;
  info.innerHTML = infoText;

  const currRecs = filterRecords(period);

  container.innerHTML = `<div class="grid grid-cols-1 ${gridCols} gap-4">${cards}</div>`;
}

// ===== Multi-period combo chart (bars + % change line, dual y-axis) =====
function drawComboChart({title, periods, datasets, unit, isInt}) {
  const W = 540, H = 360;
  const margin = {top: 42, right: 64, bottom: 76, left: 60};
  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;

  // ---- Compute % change of each selected period vs its NATURAL prior period
  //      (one unit back in current granularity), regardless of whether that
  //      prior period is selected. This ensures every selected period has a
  //      trend point, including the first selected one.
  function computePcts(values, priorValues) {
    return values.map((v, i) => {
      const prev = priorValues[i];
      if (prev === null || prev === undefined || v === null || v === undefined ||
          prev === 0 || isNaN(prev) || isNaN(v)) return null;
      return (v - prev) / prev * 100;
    });
  }
  const enriched = datasets.map(ds => ({
    ...ds,
    pcts: computePcts(ds.values, ds.priorValues || [])
  }));

  // ---- Primary (left) axis: bar values ----
  const allBarValues = datasets.flatMap(d => d.values).filter(v => v !== null && v !== undefined && !isNaN(v));
  if (allBarValues.length === 0) {
    return `<div class="text-slate-400 text-sm text-center py-16">${title}<br/><span class="text-xs">无数据</span></div>`;
  }
  const rawMin = Math.min(...allBarValues), rawMax = Math.max(...allBarValues);
  let y1Min = 0, y1Max = rawMax;
  if (rawMin > 0 && rawMin / rawMax > 0.7) {
    y1Min = rawMin - (rawMax - rawMin) * 0.25;
  }
  y1Max += (y1Max - y1Min) * 0.10;
  if (y1Max === y1Min) y1Max = y1Min + 1;

  // ---- Secondary (right) axis: % change, symmetric around 0, rounded to nice number ----
  const allPcts = enriched.flatMap(d => d.pcts).filter(v => v !== null && v !== undefined && !isNaN(v));
  let absMax = allPcts.length > 0 ? Math.max(...allPcts.map(Math.abs)) : 10;
  const niceSteps = [5, 10, 15, 20, 25, 30, 50, 75, 100, 150, 200, 300, 500];
  absMax = niceSteps.find(s => s >= absMax) || Math.ceil(absMax / 100) * 100;
  const y2Min = -absMax, y2Max = absMax;

  // ---- Layout ----
  const groupCount = periods.length;
  const groupSlot = innerW / groupCount;
  const groupPad = 0.18;
  const groupInner = groupSlot * (1 - groupPad);
  const barCount = datasets.length;
  const barGap = barCount > 1 ? Math.min(2, groupInner / barCount * 0.12) : 0;
  const barWidth = Math.max(2, (groupInner - barGap * (barCount - 1)) / barCount);

  const groupLeft = gi => margin.left + gi * groupSlot + (groupSlot - groupInner) / 2;
  const groupCenter = gi => groupLeft(gi) + groupInner / 2;
  const y1Pos = v => margin.top + (1 - (v - y1Min) / (y1Max - y1Min)) * innerH;
  const y2Pos = v => margin.top + (1 - (v - y2Min) / (y2Max - y2Min)) * innerH;

  let svg = `<svg viewBox="0 0 ${W} ${H}" class="w-full h-auto" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<text x="${W/2}" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">${title}</text>`;

  // Y1 (left) - gridlines + labels
  const ySteps = 5;
  for (let i = 0; i <= ySteps; i++) {
    const v = y1Min + (y1Max - y1Min) * (1 - i / ySteps);
    const y = margin.top + (i / ySteps) * innerH;
    svg += `<line x1="${margin.left}" y1="${y}" x2="${margin.left + innerW}" y2="${y}" stroke="#e2e8f0" stroke-width="1" />`;
    const labelV = isInt ? Math.round(v) : (Math.abs(v) >= 100 ? v.toFixed(0) : v.toFixed(1));
    svg += `<text x="${margin.left - 6}" y="${y + 4}" text-anchor="end" font-size="10" fill="#64748b">${labelV}</text>`;
  }

  // Y2 (right) - labels (dashed gridline only at 0)
  for (let i = 0; i <= ySteps; i++) {
    const v = y2Min + (y2Max - y2Min) * (1 - i / ySteps);
    const y = margin.top + (i / ySteps) * innerH;
    const sign = v > 0 ? "+" : "";
    svg += `<text x="${margin.left + innerW + 6}" y="${y + 4}" text-anchor="start" font-size="10" fill="#94a3b8">${sign}${v.toFixed(0)}%</text>`;
  }

  // Zero-% reference line (dashed)
  const zeroPctY = y2Pos(0);
  if (zeroPctY >= margin.top && zeroPctY <= margin.top + innerH) {
    svg += `<line x1="${margin.left}" y1="${zeroPctY}" x2="${margin.left + innerW}" y2="${zeroPctY}" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3" />`;
  }

  // Axis labels at top
  svg += `<text x="${margin.left - 6}" y="${margin.top - 10}" text-anchor="end" font-size="9" fill="#94a3b8">柱·${unit}</text>`;
  svg += `<text x="${margin.left + innerW + 6}" y="${margin.top - 10}" text-anchor="start" font-size="9" fill="#94a3b8">线·%</text>`;

  // Bars + period labels
  const baselineY = y1Pos(y1Min);
  periods.forEach((p, gi) => {
    const gLeft = groupLeft(gi);
    datasets.forEach((ds, di) => {
      const v = ds.values[gi];
      if (v === null || v === undefined || isNaN(v)) return;
      const x = gLeft + di * (barWidth + barGap);
      const yTop = y1Pos(v);
      const h = Math.max(0, baselineY - yTop);
      const valStr = isInt ? Math.round(v) : v.toFixed(1);
      svg += `<rect x="${x}" y="${yTop}" width="${barWidth}" height="${h}" fill="${ds.color}" fill-opacity="0.78" rx="1.5"><title>${ds.label} · ${p.label}: ${valStr}${unit}</title></rect>`;
    });
    const xc = gLeft + groupInner / 2;
    svg += `<text x="${xc}" y="${margin.top + innerH + 18}" text-anchor="end" font-size="10" fill="#64748b" transform="rotate(-35 ${xc} ${margin.top + innerH + 18})">${p.label}</text>`;
  });

  // Trend lines for % change - one per dataset
  enriched.forEach(ds => {
    let path = "", inSeg = false;
    ds.pcts.forEach((v, i) => {
      if (v === null || v === undefined || isNaN(v)) { inSeg = false; return; }
      const x = groupCenter(i), y = y2Pos(v);
      path += (inSeg ? "L " : "M ") + `${x} ${y} `;
      inSeg = true;
    });
    if (path) {
      svg += `<path d="${path}" fill="none" stroke="${ds.color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" />`;
    }
    ds.pcts.forEach((v, i) => {
      if (v === null || v === undefined || isNaN(v)) return;
      const x = groupCenter(i), y = y2Pos(v);
      const sign = v >= 0 ? "+" : "";
      const priorLabel = ds.priorLabels?.[i] || "上期";
      svg += `<circle cx="${x}" cy="${y}" r="3.8" fill="white" stroke="${ds.color}" stroke-width="2"><title>${ds.label} · ${periods[i].label} vs ${priorLabel} 环比变动: ${sign}${v.toFixed(1)}%</title></circle>`;
    });
  });

  // Axes lines
  svg += `<line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + innerH}" stroke="#cbd5e1" stroke-width="1.5" />`;
  svg += `<line x1="${margin.left + innerW}" y1="${margin.top}" x2="${margin.left + innerW}" y2="${margin.top + innerH}" stroke="#cbd5e1" stroke-width="1.5" />`;
  svg += `<line x1="${margin.left}" y1="${baselineY}" x2="${margin.left + innerW}" y2="${baselineY}" stroke="#94a3b8" stroke-width="1.5" />`;

  if (y1Min > 0) {
    svg += `<text x="${margin.left - 6}" y="${baselineY + 11}" font-size="8" fill="#94a3b8" text-anchor="end">基线 ${isInt ? Math.round(y1Min) : y1Min.toFixed(0)}</text>`;
  }

  svg += `</svg>`;

  // Legend - communities + glyph explanation
  let legend = `<div class="text-xs text-slate-600 mt-1 space-y-1">`;
  legend += `<div class="flex flex-wrap gap-3 justify-center">`;
  datasets.forEach(ds => {
    legend += `<span class="inline-flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded-sm" style="background:${ds.color};opacity:0.78"></span>${ds.label}</span>`;
  });
  legend += `</div>`;
  legend += `<div class="flex flex-wrap gap-4 justify-center text-slate-400 pt-0.5">`;
  legend += `<span class="inline-flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded-sm bg-slate-400" style="opacity:0.78"></span>柱:绝对值 (左轴)</span>`;
  legend += `<span class="inline-flex items-center gap-1.5"><svg width="22" height="8"><line x1="1" y1="4" x2="21" y2="4" stroke="#64748b" stroke-width="2"/><circle cx="11" cy="4" r="2.5" fill="white" stroke="#64748b" stroke-width="1.8"/></svg>线:环比变动率 (右轴)</span>`;
  legend += `</div></div>`;

  return svg + legend;
}

function buildDatasetsForMetric(matrix, periods, communities, metricGetter) {
  return communities.map((c, i) => {
    const values = periods.map(p => {
      const cell = matrix[p.value]?.[c];
      return cell ? metricGetter(cell) : null;
    });
    const priorPeriods = periods.map(p => prevQoQPeriod(p));
    const priorValues = priorPeriods.map(pp => {
      if (!pp) return null;
      const cell = matrix[pp.value]?.[c];
      return cell ? metricGetter(cell) : null;
    });
    const priorLabels = priorPeriods.map(pp => pp ? pp.label : null);
    return {
      label: c,
      color: COMMUNITY_COLORS[COMMUNITIES.indexOf(c) % COMMUNITY_COLORS.length],
      values,
      priorValues,
      priorLabels
    };
  });
}

function renderMultiPeriodView(periods) {
  const info = document.getElementById("period-info");
  info.innerHTML = `共选 <strong>${periods.length}</strong> 个周期对比: ${periods.map(p => p.label).join(" · ")}`;

  const communities = getSelectedCommunities();

  // Build matrix for selected periods PLUS each one's natural prior period
  // (so every selected period can show a real "环比" change, even the first)
  const periodMap = new Map();
  periods.forEach(p => periodMap.set(p.value, p));
  periods.forEach(p => {
    const prior = prevQoQPeriod(p);
    if (prior && !periodMap.has(prior.value)) periodMap.set(prior.value, prior);
  });
  const selectedKeys = new Set(periods.map(p => p.value));

  const matrix = {};
  let totalRecords = 0;
  periodMap.forEach((p, key) => {
    matrix[key] = {};
    const recs = filterRecords(p);
    if (selectedKeys.has(key)) totalRecords += recs.length;
    communities.forEach(c => {
      matrix[key][c] = computeForCommunity(recs.filter(r => r["小区"] === c));
    });
  });

  const container = document.getElementById("results-container");
  const empty = document.getElementById("empty-state");

  if (totalRecords === 0) { container.innerHTML = ""; empty.classList.remove("hidden"); return; }
  empty.classList.add("hidden");

  const charts = [
    { title: "成交均价 (万)", unit: "万", isInt: false, getter: c => c.price.mean },
    { title: "中位成交价 (万)", unit: "万", isInt: false, getter: c => c.price.median },
    { title: "最高成交价 (万)", unit: "万", isInt: false, getter: c => c.price.max },
    { title: "最低成交价 (万)", unit: "万", isInt: false, getter: c => c.price.min },
    { title: "平均成交周期 (天)", unit: "天", isInt: true, getter: c => c.days.mean },
    { title: "中位成交周期 (天)", unit: "天", isInt: true, getter: c => c.days.median },
    { title: "最长成交周期 (天)", unit: "天", isInt: true, getter: c => c.days.max },
    { title: "最短成交周期 (天)", unit: "天", isInt: true, getter: c => c.days.min },
    { title: "成交套数 (套)", unit: "套", isInt: true, getter: c => c.count }
  ];

  const chartCards = charts.map(ch => {
    const datasets = buildDatasetsForMetric(matrix, periods, communities, ch.getter);
    return `<div class="bg-white rounded-lg border border-slate-200 p-4">${drawComboChart({title: ch.title, periods, datasets, unit: ch.unit, isInt: ch.isInt})}</div>`;
  }).join("");

  // Detail table
  let table = `<div class="bg-white rounded-lg border border-slate-200 p-4 mt-4 overflow-x-auto">
    <div class="font-semibold text-slate-700 mb-3">详细数据</div>
    <table class="data-table">
      <thead><tr><th>周期 / 小区</th><th>套数</th><th>均价(万)</th><th>最低(万)</th><th>最高(万)</th><th>中位(万)</th><th>平均周期</th><th>最短周期</th><th>最长周期</th><th>中位周期</th></tr></thead>
      <tbody>`;
  periods.forEach(p => {
    communities.forEach((c, idx) => {
      const cell = matrix[p.value][c];
      const label = idx === 0 ? `<strong>${p.label}</strong> · ${c}` : `<span class="text-slate-400 pl-3">${c}</span>`;
      if (!cell) {
        table += `<tr><td>${label}</td><td colspan="9" class="text-slate-300 text-center">无数据</td></tr>`;
      } else {
        table += `<tr>
          <td>${label}</td>
          <td>${cell.count}</td>
          <td>${cell.price.mean.toFixed(1)}</td>
          <td>${cell.price.min.toFixed(1)}</td>
          <td>${cell.price.max.toFixed(1)}</td>
          <td>${cell.price.median.toFixed(1)}</td>
          <td>${Math.round(cell.days.mean)}</td>
          <td>${cell.days.min}</td>
          <td>${cell.days.max}</td>
          <td>${Math.round(cell.days.median)}</td>
        </tr>`;
      }
    });
  });
  table += `</tbody></table></div>`;

  container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${chartCards}</div>${table}`;
}

// ===== Main render =====
function renderResults() {
  const periods = getSortedSelectedPeriods();
  const container = document.getElementById("results-container");
  const empty = document.getElementById("empty-state");
  const info = document.getElementById("period-info");

  if (periods.length === 0) {
    container.innerHTML = "";
    empty.classList.add("hidden");
    info.innerHTML = `<span class="text-amber-700">⚠ 请至少选择一个查询周期</span>`;
    return;
  }
  if (periods.length === 1) {
    renderSinglePeriodView(periods[0]);
  } else {
    renderMultiPeriodView(periods);
  }
}

// ===== UI Build =====
function buildChipGroup(containerId, items, stateSet, chipClass = "chip") {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(item => `<span class="${chipClass}" data-value="${item}">${item}</span>`).join("");
  el.querySelectorAll(`.${chipClass.split(" ")[0]}`).forEach(chip => {
    chip.addEventListener("click", () => {
      const v = chip.dataset.value;
      if (stateSet.has(v)) { stateSet.delete(v); chip.classList.remove("active"); }
      else { stateSet.add(v); chip.classList.add("active"); }
    });
  });
}

function rebuildPeriodChips() {
  const el = document.getElementById("period-group");
  const opts = buildPeriodOptions(state.granularity);
  el.innerHTML = opts.map(o => `<span class="chip chip-period" data-value="${o.value}">${o.label}</span>`).join("");
  el.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const v = chip.dataset.value;
      if (state.periods.has(v)) { state.periods.delete(v); chip.classList.remove("active"); }
      else { state.periods.add(v); chip.classList.add("active"); }
    });
  });
  // default selection: pick latest period with reasonable data count
  state.periods.clear();
  for (let i = opts.length - 1; i >= 0; i--) {
    const tmpCount = RAW_DATA.filter(r => matchPeriod(r, opts[i])).length;
    if (tmpCount >= 5) {
      state.periods.add(opts[i].value);
      el.querySelector(`[data-value="${opts[i].value}"]`).classList.add("active");
      break;
    }
  }
  if (state.periods.size === 0 && opts.length > 0) {
    state.periods.add(opts[opts.length - 1].value);
    el.querySelector(`[data-value="${opts[opts.length - 1].value}"]`).classList.add("active");
  }
}

function init() {
  buildChipGroup("community-group", COMMUNITIES, state.communities);
  buildChipGroup("huxing-group", HUXINGS, state.huxings);
  buildChipGroup("floor-group", FLOOR_LEVELS, state.floors);
  buildChipGroup("orient-group", ORIENTATIONS, state.orients);

  document.getElementById("area-min").value = AREA_MIN;
  document.getElementById("area-max").value = AREA_MAX;
  document.getElementById("area-range-hint").textContent = `(实际范围 ${AREA_MIN.toFixed(0)} - ${AREA_MAX.toFixed(0)})`;

  document.querySelectorAll("#granularity-group .radio-pill").forEach(pill => {
    pill.addEventListener("click", () => {
      document.querySelectorAll("#granularity-group .radio-pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      state.granularity = pill.dataset.value;
      rebuildPeriodChips();
    });
  });

  rebuildPeriodChips();

  document.getElementById("period-all-btn").addEventListener("click", () => {
    const opts = buildPeriodOptions(state.granularity);
    state.periods = new Set(opts.map(o => o.value));
    document.querySelectorAll("#period-group .chip").forEach(c => c.classList.add("active"));
  });
  document.getElementById("period-clear-btn").addEventListener("click", () => {
    state.periods.clear();
    document.querySelectorAll("#period-group .chip").forEach(c => c.classList.remove("active"));
  });
  document.getElementById("period-recent-btn").addEventListener("click", () => {
    const opts = buildPeriodOptions(state.granularity);
    // Find the latest 3 periods with data
    const withData = opts.filter(o => RAW_DATA.some(r => matchPeriod(r, o)));
    const recent = withData.slice(-3);
    state.periods = new Set(recent.map(o => o.value));
    document.querySelectorAll("#period-group .chip").forEach(c => {
      c.classList.toggle("active", state.periods.has(c.dataset.value));
    });
  });

  document.getElementById("query-btn").addEventListener("click", () => {
    state.areaMin = parseFloat(document.getElementById("area-min").value) || AREA_MIN;
    state.areaMax = parseFloat(document.getElementById("area-max").value) || AREA_MAX;
    renderResults();
  });

  document.getElementById("reset-btn").addEventListener("click", () => {
    state.communities.clear(); state.huxings.clear(); state.floors.clear(); state.orients.clear();
    document.querySelectorAll(".chip.active").forEach(c => {
      if (!c.classList.contains("chip-period")) c.classList.remove("active");
    });
    document.getElementById("area-min").value = AREA_MIN;
    document.getElementById("area-max").value = AREA_MAX;
    state.areaMin = AREA_MIN; state.areaMax = AREA_MAX;
    state.granularity = "year";
    document.querySelectorAll("#granularity-group .radio-pill").forEach(p => {
      p.classList.toggle("active", p.dataset.value === "year");
    });
    rebuildPeriodChips();
    renderResults();
  });

  renderResults();
}

init();
</script>
</body>
</html>
